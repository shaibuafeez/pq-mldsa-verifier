name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  solidity:
    name: Solidity (forge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show versions
        run: forge --version

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

  hints:
    name: Hints (bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hints
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun test
